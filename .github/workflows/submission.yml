# Runs process_dataset.py on all new and changed files.
#
# Submissions from forks only trigger the "validation" step to validate the new
# data. After merging into a new branch in the parent repo, the workflow will
# run again and trigger the "update" step to add reaction IDs, etc. in
# preparation for merging into the "main" branch.

name: Submission

on:
  pull_request:
    # Default trigger types plus labeled/unlabeled so adding or removing the
    # `skip-update-submission` label re-runs the workflow with the new
    # gating on the "Update submission" step.
    types: [opened, synchronize, reopened, labeled, unlabeled]

# One in-flight run per PR. New events (pushes, label toggles) cancel
# the prior run so we are not paying twice for things like LFS checkouts.
concurrency:
  group: submission-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  ORD_SCHEMA_TAG: v0.6.3

jobs:
  check_file_types:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Add upstream for comparisons to HEAD
      run: |
        cd "${GITHUB_WORKSPACE}"
        git remote add upstream \
          "https://github.com/Open-Reaction-Database/${GITHUB_REPOSITORY##*/}.git"
        echo "Current branch: $(git rev-parse --abbrev-ref HEAD)"
        git fetch --no-tags --prune --depth=1 upstream \
          +refs/heads/*:refs/remotes/upstream/*
    - name: Check changed files (PR from fork)
      run: |
        cd "${GITHUB_WORKSPACE}"
        git diff --name-only upstream/main > changed_files.txt
        grep -vE '\.(pb(txt)?(.gz)?|parquet)$' changed_files.txt && \
          echo "Error: submissions should only contain (gzipped) *.pbtxt, *.pb, or *.parquet files" && \
          exit 1 || true
      if: github.event.pull_request.head.repo.fork

  check_target_branch:
    if: github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    steps:
    - name: Check target branch
      run: |
        echo "Target branch: ${GITHUB_BASE_REF}"
        test "${GITHUB_BASE_REF}" != "main"

  process_submission:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout ord-data
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        lfs: false
    - name: Add upstream for comparisons to HEAD
      run: |
        cd "${GITHUB_WORKSPACE}"
        git remote add upstream \
          "https://github.com/Open-Reaction-Database/${GITHUB_REPOSITORY##*/}.git"
        echo "Current branch: $(git rev-parse --abbrev-ref HEAD)"
        git fetch --no-tags --prune --depth=1 upstream \
          +refs/heads/*:refs/remotes/upstream/*
    - name: Checkout ord-schema
      uses: actions/checkout@v4
      with:
        repository: Open-Reaction-Database/ord-schema
        ref: ${{ env.ORD_SCHEMA_TAG }}
        path: ord-schema
    - name: Identify changed files
      # NOTE(kearnes): This sets the NUM_CHANGED_FILES variable.
      run: |
        cd "${GITHUB_WORKSPACE}"
        git diff --name-status upstream/main > changed_files.txt
        echo "Found $(wc -l < changed_files.txt | tr -d ' ') changed files"
        cat changed_files.txt
        # Use `|| (( $? == 1 ))` in case no lines match (exit code is nonzero).
        grep -E "\.(pb(txt)?(.gz)?|parquet)$" changed_files.txt > changed_data_files.txt || (( $? == 1 ))
        # Use LOCAL_NUM_CHANGED since ::set-env values are not available immediately.
        LOCAL_NUM_CHANGED="$(wc -l < changed_data_files.txt | tr -d ' ')"
        echo "NUM_CHANGED_FILES=${LOCAL_NUM_CHANGED}" >> $GITHUB_ENV
        echo "Found ${LOCAL_NUM_CHANGED} changed dataset files"
        cat changed_data_files.txt
    # Read LFS from GitHub, not the HF mirror that .lfsconfig points clones at:
    # submissions are validated before their bytes are mirrored to HF on merge
    # to main, and the "Update submission" step's uploads reuse this lfs.url
    # override (.lfsconfig has no pushurl). Only the changed datasets are
    # pulled: process_dataset reads just these inputs, and base revisions of
    # modified files are smudged on demand through the same lfs.url, so the
    # rest of the repository is never needed. Skipped entirely when no dataset
    # files changed.
    - name: Fetch changed LFS objects from GitHub
      if: env.NUM_CHANGED_FILES != '0'
      run: |
        cd "${GITHUB_WORKSPACE}"
        git config lfs.url "https://github.com/${GITHUB_REPOSITORY}.git/info/lfs"
        # changed_data_files.txt holds `git diff --name-status` lines; the last
        # field is the current path (the new path for renames). Paths without an
        # LFS object at HEAD (root submissions, deletions) are no-ops here.
        INCLUDE="$(awk '{print $NF}' changed_data_files.txt | paste -sd, -)"
        echo "Pulling LFS objects for changed datasets: ${INCLUDE}"
        git lfs pull --include="${INCLUDE}"
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
      if: env.NUM_CHANGED_FILES != '0'
    - name: Install ord_schema
      run: |
        cd "${GITHUB_WORKSPACE}/ord-schema"
        python -m pip install --upgrade pip
        python -m pip install wheel
        python -m pip install .
      if: env.NUM_CHANGED_FILES != '0'
    - name: Validate submission
      run: |
        cd "${GITHUB_WORKSPACE}"
        python ./ord-schema/ord_schema/scripts/process_dataset.py \
          --input_file=changed_data_files.txt \
          --base=upstream/main
      if: >-
        env.NUM_CHANGED_FILES != '0' &&
        github.event.pull_request.head.repo.fork
    - name: Update submission
      run: |
        cd "${GITHUB_WORKSPACE}"
        python ./ord-schema/ord_schema/scripts/process_dataset.py \
          --input_file=changed_data_files.txt \
          --update \
          --cleanup \
          --base=upstream/main \
          --issue=${{ github.event.number }} \
          --token=${{ secrets.GITHUB_TOKEN }}
        git config user.name github-actions
        git config user.email github-actions@github.com
        # Fail gracefully if there is nothing to commit.
        git commit -a -m "Update submission" || (( $? == 1 ))
        git push "https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_HEAD_REF}"
      # Skipped when the PR carries the `skip-update-submission` label, so
      # maintainer PRs that touch dataset files but do not need ID/timestamp
      # assignment (e.g. format conversions) can land without process_dataset
      # rewriting the inputs.
      if: >-
        env.NUM_CHANGED_FILES != '0' &&
        ! github.event.pull_request.head.repo.fork &&
        ! contains(github.event.pull_request.labels.*.name, 'skip-update-submission')
